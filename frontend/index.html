<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TechIT Network — Where Founders, Collaborators, Investors and Organisations Connect and Build" />
    <title>TechIT Network</title>
    <script>
      (function () {
        const stored = localStorage.getItem('techit-theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const effective = stored === 'light' ? 'light' : stored === 'dark' ? 'dark' : (systemDark ? 'dark' : 'light');
        document.documentElement.classList.add(effective);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
